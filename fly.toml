# fly.toml app configuration file generated for prudenceapp on 2026-04-07T14:48:41+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'prudenceapp'
primary_region = 'iad'

[build]
  [build.args]
    NEXT_PUBLIC_APP_NAME = 'Capital Pay'
    NEXT_PUBLIC_LOGO_URL = '/capitalpay.png'

[deploy]
  release_command = 'npx prisma db push'

[env]
  AUTH_TRUST_HOST = 'true'
  AUTH_URL = 'https://capitalpaybooks.pro'
  NEXTAUTH_URL = 'https://capitalpaybooks.pro'
  NEXT_PUBLIC_APP_NAME = 'Capital Pay'
  NEXT_PUBLIC_LOGO_URL = '/capitalpay.png'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
