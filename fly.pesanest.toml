# fly.toml app configuration file for Pesanest
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pesanest-finance'
primary_region = 'iad'

[build]
  [build.args]
    NEXT_PUBLIC_APP_NAME = "Pesanest"
    NEXT_PUBLIC_LOGO_URL = "/pesanest/pesanest-dark.png"

[deploy]
  release_command = "npx prisma db push"

[env]
  NODE_ENV = 'production'
  NEXT_PUBLIC_APP_NAME = "Pesanest"
  NEXT_PUBLIC_LOGO_URL = "/pesanest/pesanest-dark.png"
  NEXTAUTH_URL = 'https://pesanest-finance.fly.dev'
  AUTH_URL = 'https://pesanest-finance.fly.dev'
  AUTH_TRUST_HOST = 'true'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
